name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (without leading 'v')"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Verify csproj <Version> matches input
        shell: pwsh
        run: |
          $expected = "${{ inputs.version }}"
          $csproj = Get-Content src/MyPortfolio/MyPortfolio.csproj -Raw
          if ($csproj -notmatch "<Version>$([regex]::Escape($expected))</Version>") {
            Write-Error "csproj <Version> does not match input '$expected'. Bump the csproj first."
            exit 1
          }
          Write-Host "OK — csproj <Version> = $expected"

      - name: Restore
        run: dotnet restore src/MyPortfolio/MyPortfolio.csproj

      - name: Publish (framework-dependent, win-x64)
        run: >
          dotnet publish src/MyPortfolio/MyPortfolio.csproj
          -c Release -r win-x64 --self-contained false
          -o publish/win-x64 --no-restore

      - name: Smoke test — exe exists
        shell: pwsh
        run: |
          $exe = "publish/win-x64/MyPortfolio.exe"
          if (-not (Test-Path $exe)) { Write-Error "MyPortfolio.exe missing after publish."; exit 1 }
          Write-Host "OK — $exe exists ($((Get-Item $exe).Length) bytes)"

      - name: Package — ZIP + SHA-256 sidecar
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $zip = "MyPortfolio-v$version-win-x64.zip"
          Compress-Archive -Path publish/win-x64/* -DestinationPath $zip -Force
          $hash = (Get-FileHash -Path $zip -Algorithm SHA256).Hash.ToLower()
          "$hash  $zip" | Out-File -FilePath "$zip.sha256.txt" -Encoding ascii -NoNewline
          Write-Host "Hash: $hash"
          Write-Host "Artifacts:"
          Get-Item $zip, "$zip.sha256.txt" | ForEach-Object { "  $($_.Name) ($($_.Length) bytes)" }

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $tag = "v$version"
          $zip = "MyPortfolio-v$version-win-x64.zip"
          $sha = "$zip.sha256.txt"
          $existing = gh release view $tag --json tagName 2>$null
          if (-not $existing) {
            Write-Host "Creating release $tag..."
            gh release create $tag --title "MyPortfolio $tag" --notes-file CHANGELOG.md
          } else {
            Write-Host "Release $tag already exists; uploading assets with --clobber."
          }
          gh release upload $tag $zip --clobber
          gh release upload $tag $sha --clobber
